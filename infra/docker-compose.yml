version: '3.8'

services:
  dasd-orchestrator:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: dasd_orchestrator
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
    volumes:
      - ../src:/app/src
    restart: unless-stopped
