services:
  - type: web
    name: dasd-backend
    env: python
    buildCommand: pip install -r infra/requirements.txt
    startCommand: uvicorn src.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: STORAGE_DIR
        value: /data
      - key: PYTHONPATH
        value: .
      - key: GROQ_API_KEY_1
        sync: false # You must set this manually in the dashboard
      - key: GROQ_API_KEY_2
        sync: false # You must set this manually in the dashboard
    disk:
      name: dasd-data
      mountPath: /data
      sizeGB: 1
